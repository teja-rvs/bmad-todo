name: Performance Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'perf/**'
      - 'bmad-todo-api/**'
      - 'bmad-todo-client/**'
      - 'docker-compose.yml'
      - '.github/workflows/performance.yml'

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-perf:
    name: API Performance (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start API stack
        run: docker compose up -d --build db api
        env:
          SECRET_KEY_BASE: ci-test-secret-key-base-not-real

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/up > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 performance tests
        run: k6 run perf/api-perf.js

      - name: Tear down
        if: always()
        run: docker compose down -v

  client-perf:
    name: Client Performance (Lighthouse CI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bmad-todo-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bmad-todo-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse CI
        run: npm run perf
